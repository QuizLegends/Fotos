<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL DE ACESSO RESTRITO</title>
    <style>
        /* Estilo Dark e Moderno */
        body { 
            background: #0d1117; 
            color: #c9d1d9; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Cartão de Login Estilo Vidro (Glassmorphism) */
        .login-card { 
            background: rgba(22, 27, 34, 0.9);
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 40px; 
            width: 320px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        h2 { 
            color: #58a6ff; 
            margin-bottom: 5px;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            font-size: 12px;
            color: #8b949e;
            margin-bottom: 25px;
        }

        /* Inputs e Botões Estilizados */
        input { 
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #30363d;
            background: #010409;
            color: white;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: #58a6ff; box-shadow: 0 0 5px rgba(88, 166, 255, 0.3); }

        button { 
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #238636;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover { background: #2ea043; }

        #status { 
            margin-top: 20px; 
            font-size: 13px; 
            font-weight: bold;
            padding: 10px;
            border-radius: 4px;
            background: rgba(0,0,0,0.2);
        }

        /* Ícone de Cadeado Simulado */
        .lock-icon {
            font-size: 40px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="lock-icon">🔒</div>
        <h2>Acesso à Nuvem</h2>
        <p>SERVIDOR: DB-CLOUDFILES-01</p>
        
        <input type="password" id="pass" placeholder="Insira a Credencial">
        <button onclick="check()">AUTENTICAR</button>
        
        <div id="status">SISTEMA AGUARDANDO...</div>
    </div>

    <script>
        const SENHA_REAL = "aab7p9"; 

        function check() {
            const input = document.getElementById('pass').value;
            const status = document.getElementById('status');
            
            if(input === SENHA_REAL) {
                status.innerHTML = "🔓 ACESSO CONCEDIDO! REDIRECIONANDO...";
                status.style.color = "#7ee787";
                status.style.backgroundColor = "rgba(46, 160, 67, 0.15)";
                
                // Simula uma entrada no sistema após 1 segundo
                setTimeout(() => {
                    alert("Bem-vindo, Admin. Acesso à base de dados liberado.");
                }, 1000);

            } else {
                status.innerHTML = "❌ CREDENCIAL INVÁLIDA!";
                status.style.color = "#ff7b72";
                status.style.backgroundColor = "rgba(248, 81, 73, 0.15)";
                
                // Limpa o campo de senha para a próxima tentativa
                document.getElementById('pass').value = "";
            }
        }
    </script>
</body>
</html>
