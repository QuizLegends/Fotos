<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sincronizando Datacenter...</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #terminal { width: 95%; max-width: 900px; height: 90vh; border: 1px solid #0f0; padding: 20px; overflow-y: auto; background: #000; position: relative; }
        .log { margin-bottom: 4px; font-size: 12px; }
        .crit { color: #ff0000; font-weight: bold; text-transform: uppercase; }
        .done { color: #00ff00; }
        .head { color: #00ccff; border-bottom: 1px solid #00ccff; margin-bottom: 10px; padding-bottom: 5px; }
        #scanline { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: rgba(0, 255, 0, 0.1); animation: scan 4s linear infinite; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body>

    <div id="terminal">
        <div id="scanline"></div>
        <div class="head">TERMINAL DE RASTREAMENTO REMOTO v7.0 - ACESSO AUTORIZADO</div>
    </div>

    <script>
        const term = document.getElementById('terminal');

        function log(msg, cls='') {
            const div = document.createElement('div');
            div.className = `log ${cls}`;
            div.innerHTML = `[${new Date().toLocaleTimeString()}] > ${msg}`;
            term.appendChild(div);
            term.scrollTop = term.scrollHeight;
        }

        async function stealthScan() {
            log("INICIALIZANDO VARREDURA SILENCIOSA...", "head");
            await new Promise(r => setTimeout(r, 600));

            // 1. EXTRAÇÃO DE HARDWARE E SOFTWARE (SILENCIOSO)
            log("COLETANDO FINGERPRINT DO DISPOSITIVO...");
            log(`OS: ${navigator.platform}`, "done");
            log(`NAVEGADOR: ${navigator.userAgent.split(') ')[1]}`, "done");
            log(`RESOLUÇÃO: ${screen.width}x${screen.height}`, "done");
            log(`LÍNGUA: ${navigator.language}`, "done");
            log(`NÚCLEOS DE CPU: ${navigator.hardwareConcurrency || 'N/A'}`, "done");

            // 2. RASTREIO DE REDE AVANÇADO (MÚLTIPLAS APIS)
            log("MAPEANDO CONEXÃO E LOCALIZAÇÃO POR IP...", "crit");
            
            try {
                // API 1: Dados Geográficos
                const r1 = await fetch('https://ipapi.co/json/');
                const d = await r1.json();
                
                log("--- RESULTADOS DE LOCALIZAÇÃO ---", "head");
                log(`IP PÚBLICO: ${d.ip}`, "crit");
                log(`PAÍS: ${d.country_name} (${d.country_code})`, "done");
                log(`ESTADO: ${d.region}`, "done");
                log(`CIDADE: ${d.city}`, "done");
                log(`BAIRRO/LOGRADOURO: ${d.road || 'Aproximado pelo Provedor'}`, "done");
                log(`CÓDIGO POSTAL: ${d.postal}`, "done");
                log(`PROVEDOR: ${d.org}`, "done");
                log(`COORDENADAS: ${d.latitude}, ${d.longitude}`, "crit");
                
                // API 2: Dados de Fuso e Moeda (ajuda a confirmar localização)
                log(`FUSO HORÁRIO: ${d.timezone}`, "done");
                log(`MOEDA LOCAL: ${d.currency}`, "done");

            } catch (e) {
                log("FALHA NO TÚNEL 1. TENTANDO BACKUP...", "crit");
                const r2 = await fetch('https://ipwho.is/');
                const d2 = await r2.json();
                log(`IP: ${d2.ip} | CIDADE: ${d2.city}`, "done");
            }

            // 3. STATUS DE CONEXÃO
            if (navigator.connection) {
                log("ANALISANDO QUALIDADE DA REDE...");
                log(`TIPO: ${navigator.connection.effectiveType}`, "done");
                log(`VELOCIDADE: ~${navigator.connection.downlink} Mbps`, "done");
            }

            log("--- VARREDURA COMPLETA - DADOS ENVIADOS ---", "head");
            log("AGUARDANDO NOVA CONEXÃO NO LINK...", "done");
        }

        // DISPARO IMEDIATO AO CLICAR NO LINK
        window.onload = stealthScan;
    </script>
</body>
</html>
