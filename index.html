<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIRESTORE TURBO INJECTOR v5</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; padding: 20px; }
        .box { border: 2px solid #00ff41; padding: 20px; box-shadow: 0 0 15px #00ff41; max-width: 400px; margin: auto; }
        .header-status { font-size: 10px; text-align: right; margin-bottom: 10px; color: #008000; }
        input { background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 12px; width: 100%; margin-bottom: 15px; outline: none; box-sizing: border-box; }
        button { width: 100%; background: #00ff41; color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 16px; }
        button:hover { background: #fff; }
        button:disabled { background: #333; color: #666; cursor: not-allowed; }
        #logs { margin-top: 20px; font-size: 11px; height: 220px; overflow-y: auto; border: 1px solid #333; padding: 10px; background: #000; color: #00ff41; }
        .success { color: #fff; background: #008000; padding: 2px; font-weight: bold; }
        .error { color: #ff0000; font-weight: bold; border-left: 3px solid #ff0000; padding-left: 5px; }
        .info { color: #00bfff; }
    </style>
</head>
<body>

<div class="box">
    <div class="header-status">TARGET_CLUSTER: QUIZLEGENDS-F58FC ● AUTO-BYPASS</div>
    <h3>[ TURBO_INJECTOR_v5 ]</h3>
    
    <label style="font-size: 10px;">ID DO ALVO:</label>
    <input type="text" id="userId" value="e8cYdMXiVTfuiITVAOVB6DOCigE2" readonly style="opacity: 0.6;">
    
    <label style="font-size: 10px;">TOTAL DESEJADO (PDL/GOLD):</label>
    <input type="number" id="valorTotal" placeholder="Ex: 100000">

    <button id="btnTurbo">Iniciar Injeção Turbo</button>

    <div id="logs">> Protocolo pronto. Aguardando comando...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getFirestore, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyC4dm0KoyJswhyCY7tgbF4D2nmuZl84X8E", 
        authDomain: "quizlegends-f58fc.firebaseapp.com", 
        projectId: "quizlegends-f58fc" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const logBox = document.getElementById('logs');
    const btn = document.getElementById('btnTurbo');

    function log(msg, type = '') {
        const div = document.createElement('div');
        div.className = type;
        div.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logBox.appendChild(div);
        logBox.scrollTop = logBox.scrollHeight;
    }

    async function iniciarInjecaoTurbo() {
        const uid = document.getElementById('userId').value;
        const totalAlvo = parseInt(document.getElementById('valorTotal').value);
        
        if (isNaN(totalAlvo) || totalAlvo <= 0) return alert("Insira um valor válido.");

        btn.disabled = true;
        log("Iniciando Sequência de Burlar Limite...", "info");
        
        let acumulado = 0;
        const dose = 5000; // Mantém abaixo do seu limite de 5001
        const userRef = doc(db, "usuarios", uid);

        try {
            while (acumulado < totalAlvo) {
                // Se o que falta for menor que a dose, ajusta a última dose
                const doseAtual = (totalAlvo - acumulado) < dose ? (totalAlvo - acumulado) : dose;

                log(`Enviando pacote: +${doseAtual} unidades...`);

                await updateDoc(userRef, {
                    goldDB: increment(doseAtual),
                    pdlInterno: increment(doseAtual),
                    bypass_sync: true
                });

                acumulado += doseAtual;
                log(`Sincronizado: ${acumulado}/${totalAlvo}`, "success");

                // Delay de 300ms para evitar bloqueio por IP (flood control)
                await new Promise(r => setTimeout(r, 300));
            }

            log("PROCESSO FINALIZADO COM SUCESSO!", "success");
            log("Toda a quantia foi injetada em doses de 5000.");

        } catch (e) {
            log(`FALHA NO LOOP: ${e.message}`, "error");
            log("O Firebase detectou o padrão de injeção ou as Rules bloquearam.", "error");
        } finally {
            btn.disabled = false;
        }
    }

    btn.addEventListener('click', iniciarInjecaoTurbo);
</script>

</body>
</html>
