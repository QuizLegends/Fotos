<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sincronizando Datacenter...</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #terminal { width: 95%; max-width: 900px; height: 90vh; border: 1px solid #0f0; padding: 20px; overflow-y: auto; background: #000; position: relative; }
        .log { margin-bottom: 4px; font-size: 12px; }
        .crit { color: #ff0000; font-weight: bold; }
        .done { color: #00ff00; }
        .head { color: #00ccff; border-bottom: 1px solid #00ccff; margin-bottom: 10px; padding-bottom: 5px; }
        .warn { color: #ffff00; }
    </style>
</head>
<body>

    <div id="terminal">
        <div class="head">SISTEMA DE MONITORAMENTO - BYPASS ATIVO (v7.3)</div>
    </div>

    <script>
        const term = document.getElementById('terminal');

        function log(msg, cls='') {
            const div = document.createElement('div');
            div.className = `log ${cls}`;
            div.innerHTML = `[${new Date().toLocaleTimeString()}] > ${msg}`;
            term.appendChild(div);
            term.scrollTop = term.scrollHeight;
        }

        async function stealthScan() {
            log("INICIALIZANDO VARREDURA DE ALTA PRECISÃO...", "head");

            // APIs ricas em dados (Geo-IP)
            const fullDataApis = [
                'https://ipwho.is/',
                'https://ipapi.co/json/',
                'https://extreme-ip-lookup.com/json/'
            ];

            log("DISPARANDO SONDAS MULTI-TÚNEL...");

            try {
                // Tenta apenas as APIs que trazem localização. Se não trouxer Latitude, o código descarta e tenta a próxima.
                const response = await Promise.any(fullDataApis.map(url => 
                    fetch(url).then(res => res.json()).then(data => {
                        if (!data.latitude && !data.lat) throw new Error("Incompleto");
                        return data;
                    })
                ));

                log("CONEXÃO COM GPS DE REDE ESTABELECIDA.", "done");

                // Normalização inteligente dos dados
                const ip = response.ip || response.query;
                const city = response.city || response.city_name || "N/A";
                const region = response.region || response.region_name || "N/A";
                const isp = response.connection?.isp || response.org || "Privado";
                const lat = response.latitude || response.lat;
                const lon = response.longitude || response.lon;

                log(`IP_ALVO: ${ip}`, "crit");
                log(`CIDADE: ${city}, ${region}`, "done");
                log(`PROVEDOR: ${isp}`, "done");
                log(`COORDENADAS: ${lat}, ${lon}`, "crit");
                log(`MAP_LINK: https://www.google.com/maps?q=${lat},${lon}`, "done");

            } catch (e) {
                log("TÚNEIS DE PRECISÃO BLOQUEADOS. TENTANDO IP SIMPLES...", "warn");
                try {
                    const resSimple = await fetch('https://api.ipify.org?format=json');
                    const simple = await resSimple.json();
                    log(`IP_ALVO (APENAS): ${simple.ip}`, "crit");
                    log("AVISO: Localização detalhada protegida por Firewall.", "warn");
                } catch(err) {
                    log("ERRO CRÍTICO: FALHA TOTAL NA COMUNICAÇÃO.", "crit");
                }
            }

            log("VARREDURA CONCLUÍDA.", "head");
        }

        window.onload = stealthScan;
    </script>
</body>
</html>
