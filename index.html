<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL OS - HIGH VELOCITY</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; padding: 20px; text-align: center; }
        .panel { width: 100%; max-width: 500px; border: 1px solid #00ff41; padding: 20px; background: #000; margin: auto; box-shadow: 0 0 20px #00ff4133; }
        #console { height: 250px; overflow-y: auto; background: #000; border: 1px solid #113311; padding: 10px; margin-top: 15px; font-size: 11px; text-align: left; }
        .progress-bar { width: 100%; height: 10px; background: #111; margin: 10px 0; border: 1px solid #00ff41; }
        #fill { width: 0%; height: 100%; background: #00ff41; }
        button { background: #00ff41; color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>SENTINEL HIGH-SPEED</h1>
    <div class="panel">
        <div id="status">> ALVO: alvo.html | COMPLEXIDADE: 6 DIG</div>
        <div class="progress-bar"><div id="fill"></div></div>
        <div id="console">> AGUARDANDO COMANDO...</div>
        <button id="btn" onclick="crack6Digits()">EXECUTAR QUEBRA DE 6 DÍGITOS</button>
    </div>

    <iframe id="targetFrame" src="alvo.html" style="display:none;"></iframe>

    <script>
        async function log(m) {
            const c = document.getElementById('console');
            c.innerHTML += `<div>> ${m}</div>`;
            c.scrollTop = c.scrollHeight;
        }

        async function crack6Digits() {
            const btn = document.getElementById('btn');
            const targetDoc = document.getElementById('targetFrame').contentDocument;
            const input = targetDoc.getElementById('pass');
            const botao = targetDoc.querySelector('button');
            const statusAlvo = targetDoc.getElementById('status');
            
            const charset = "abcdefghijklmnopqrstuvwxyz0123456789";
            btn.disabled = true;
            log("Iniciando varredura massiva de 6 dígitos...");

            // Vamos direto para o tamanho 6 para ganhar tempo
            let count = 0;
            const totalEstima = Math.pow(charset.length, 6);

            // Gerador de combinações otimizado para performance
            async function brute(prefixo, profundidade) {
                if (profundidade === 0) {
                    count++;
                    input.value = prefixo;
                    botao.click();

                    if (statusAlvo.innerHTML.includes("CONCEDIDO")) {
                        log(`[!!!] SUCESSO: ${prefixo}`, "found");
                        alert("INVADIDO! Senha: " + prefixo);
                        return true;
                    }

                    if (count % 1000 === 0) {
                        document.getElementById('fill').style.width = `${(count/1000000)*100}%`; // Simulação de barra
                        if (count % 5000 === 0) {
                            await log(`Processando: ${prefixo}...`);
                            await new Promise(r => setTimeout(r, 0)); // Pausa mínima para o UI não travar
                        }
                    }
                    return false;
                }

                for (let i = 0; i < charset.length; i++) {
                    if (await brute(prefixo + charset[i], profundidade - 1)) return true;
                }
                return false;
            }

            // Inicia o ataque focado em 6 dígitos
            await brute("", 6);
            
            log("Processo finalizado.");
            btn.disabled = false;
        }
    </script>
</body>
</html>
