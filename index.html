<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaBoost | Exploit Panel</title>
    <style>
        :root { --main-color: #00f2ff; --bg-color: #0a0a0a; }
        body { background-color: var(--bg-color); color: var(--main-color); font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #panel { width: 90%; max-width: 400px; border: 1px solid var(--main-color); padding: 20px; box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }
        h2 { text-align: center; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid var(--main-color); padding-bottom: 10px; }
        .input-group { margin: 20px 0; }
        input { width: 100%; background: #000; border: 1px solid var(--main-color); color: var(--main-color); padding: 10px; box-sizing: border-box; outline: none; }
        button { width: 100%; background: var(--main-color); color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: #fff; box-shadow: 0 0 20px #fff; }
        #status-box { margin-top: 20px; font-size: 12px; height: 100px; overflow-y: auto; border-top: 1px dashed var(--main-color); padding-top: 10px; }
        .loading { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div id="panel">
    <h2>InstaBoost v1.0</h2>
    <div class="input-group">
        <label>TARGET_USER:</label>
        <input type="text" id="target" placeholder="@usuario_alvo">
    </div>
    <div class="input-group">
        <label>QUANTIDADE:</label>
        <input type="number" id="amount" placeholder="Ex: 50">
    </div>
    <button onclick="startInjection()">Iniciar Injeção</button>

    <div id="status-box">
        <div id="logs">> Aguardando comando...</div>
    </div>
</div>

<script>
    const logs = document.getElementById('logs');

    function addLog(text, isCrit = false) {
        const time = new Date().toLocaleTimeString();
        const div = document.createElement('div');
        div.innerHTML = `[${time}] ${isCrit ? '!!' : '>'} ${text}`;
        logs.appendChild(div);
        document.getElementById('status-box').scrollTop = document.getElementById('status-box').scrollHeight;
    }

    async function startInjection() {
        const user = document.getElementById('target').value;
        if(!user) return alert("Insira o alvo!");

        addLog(`Iniciando conexão com servidores de bots...`, false);
        addLog(`Alvo definido: ${user}`, true);

        // Simulando a conexão com os painéis externos
        const panels = ["Server_RU", "Server_TR", "SMM_Global"];
        
        for(let server of panels) {
            addLog(`Conectando ao cluster ${server}...`, false);
            await new Promise(r => setTimeout(r, 1500));
            addLog(`Requisição de seguidores enviada via ${server}!`, false);
        }

        addLog("INJEÇÃO FINALIZADA. Os seguidores chegarão em instantes.", true);
    }
</script>

</body>
</html>
