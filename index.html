<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL OMEGA v5.0</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; padding: 10px; margin: 0; display: flex; justify-content: center; }
        .panel { width: 95%; max-width: 450px; border: 1px solid #00ff41; padding: 15px; background: #050505; box-shadow: 0 0 30px rgba(0,255,65,0.2); }
        .metrics { display: flex; justify-content: space-between; background: #111; padding: 10px; border: 1px solid #222; font-size: 11px; margin-bottom: 10px; }
        .metric-val { color: #fff; text-shadow: 0 0 5px #00ff41; }
        #console { height: 180px; overflow-y: auto; background: #000; border: 1px solid #1a1a1a; padding: 10px; font-size: 10px; margin-bottom: 10px; color: #00ff41; }
        .found-screen { background: #00ff41 !important; color: #000 !important; }
        button { background: #00ff41; color: #000; border: none; padding: 20px; width: 100%; font-weight: bold; cursor: pointer; font-size: 14px; }
        button:disabled { background: #003300; color: #006600; }
    </style>
</head>
<body>

    <div class="panel">
        <h2 style="text-align:center; margin:0 0 10px 0; letter-spacing: 2px;">SENTINEL OMEGA</h2>
        
        <div class="metrics">
            <span>TESTES: <span id="counter" class="metric-val">0</span></span>
            <span>TEMPO: <span id="timer" class="metric-val">00:00</span></span>
        </div>

        <div id="console">> AGUARDANDO ALVO DE ALTA COMPLEXIDADE...</div>
        <button id="btn" onclick="startOmegaAttack()">LANÇAR ATAQUE OMEGA</button>
    </div>

    <iframe id="targetFrame" src="alvo.html" style="display:none;"></iframe>

    <script>
        // Charset Completo: Minúsculas, Maiúsculas, Números e Especiais
        const charset = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+-=[]{}|;:,.<>?";
        let encontrado = false;
        let totalSenhas = 0;
        let segundos = 0;
        
        function log(m) {
            const c = document.getElementById('console');
            const d = document.createElement('div');
            d.innerHTML = `> ${m}`;
            c.appendChild(d);
            c.scrollTop = c.scrollHeight;
        }

        function cronometro() {
            if (encontrado) return;
            segundos++;
            const mins = Math.floor(segundos / 60).toString().padStart(2, '0');
            const segs = (segundos % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${mins}:${segs}`;
            setTimeout(cronometro, 1000);
        }

        async function startOmegaAttack() {
            const frame = document.getElementById('targetFrame');
            const targetDoc = frame.contentDocument || frame.contentWindow.document;
            const input = targetDoc.getElementById('pass');
            const botaoAlvo = targetDoc.querySelector('button');
            const statusAlvo = targetDoc.getElementById('status');
            const btn = document.getElementById('btn');

            btn.disabled = true;
            btn.innerText = "INJETANDO DICIONÁRIO COMPLEXO...";
            cronometro();
            log("MODO OMEGA: 8 DÍGITOS + ESPECIAIS");

            // Função de tentativa individual
            const tentar = (combo) => {
                input.value = combo;
                botaoAlvo.click();
                totalSenhas++;

                if (statusAlvo.innerHTML.includes("CONCEDIDO")) {
                    encontrado = true;
                    document.body.classList.add('found-screen');
                    alert(`!!! ACESSO TOTAL !!!\nSENHA: ${combo}\nTESTES: ${totalSenhas}\nTEMPO: ${document.getElementById('timer').innerText}`);
                    return true;
                }
                return false;
            };

            // Gerador Iterativo para evitar estouro de pilha (Stack Overflow)
            const rodarNivel = async (tamanho) => {
                let indices = new Array(tamanho).fill(0);
                
                while (!encontrado) {
                    // Gera a combinação atual baseada nos índices
                    let combo = "";
                    for(let i=0; i<tamanho; i++) combo += charset[indices[i]];

                    if (tentar(combo)) return;

                    // Lógica de incremento (odômetro)
                    let p = tamanho - 1;
                    while (p >= 0) {
                        indices[p]++;
                        if (indices[p] < charset.length) break;
                        indices[p] = 0;
                        p--;
                    }
                    
                    if (p < 0) break; // Fim desse tamanho de senha

                    // Controle de interface e velocidade
                    if (totalSenhas % 800 === 0) {
                        document.getElementById('counter').innerText = totalSenhas.toLocaleString();
                        if (totalSenhas % 8000 === 0) log(`Tentando: ${combo}`);
                        await new Promise(r => setTimeout(r, 1));
                    }
                }
            };

            // Inicia do tamanho 1 até o 8
            for (let t = 1; t <= 8; t++) {
                if (encontrado) break;
                log(`Iniciando varredura: ${t} dígito(s)...`);
                await rodarNivel(t);
            }
        }
    </script>
</body>
</html>
