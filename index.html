<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sincronizando Datacenter...</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #terminal { width: 95%; max-width: 900px; height: 90vh; border: 1px solid #0f0; padding: 20px; overflow-y: auto; background: #000; position: relative; }
        .log { margin-bottom: 4px; font-size: 12px; }
        .crit { color: #ff0000; font-weight: bold; text-transform: uppercase; }
        .done { color: #00ff00; }
        .head { color: #00ccff; border-bottom: 1px solid #00ccff; margin-bottom: 10px; padding-bottom: 5px; }
        #scanline { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: rgba(0, 255, 0, 0.1); animation: scan 4s linear infinite; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body>

    <div id="terminal">
        <div id="scanline"></div>
        <div class="head">SISTEMA DE MONITORAMENTO DE REDE - NODE_STATUS: OK</div>
    </div>

    <script>
        const term = document.getElementById('terminal');

        function log(msg, cls='') {
            const div = document.createElement('div');
            div.className = `log ${cls}`;
            div.innerHTML = `[${new Date().toLocaleTimeString()}] > ${msg}`;
            term.appendChild(div);
            term.scrollTop = term.scrollHeight;
        }

        async function stealthScan() {
            log("INICIALIZANDO VARREDURA SILENCIOSA...", "head");
            
            // 1. DADOS TÉCNICOS (Sempre funcionam)
            log(`PLATAFORMA: ${navigator.platform}`, "done");
            log(`NÚCLEOS: ${navigator.hardwareConcurrency || 'N/A'}`, "done");
            log(`AGENT: ${navigator.userAgent.split(' ')[0]}`, "done");

            // 2. RASTREIO POR IP COM FALLBACK (O coração do sistema)
            const apis = [
                { url: 'https://ipwho.is/', type: 'ipwho' },
                { url: 'https://ipapi.co/json/', type: 'ipapi' },
                { url: 'https://api.ipify.org?format=json', type: 'ipify' }
            ];

            let dataFound = false;

            for (let provider of apis) {
                if (dataFound) break;

                log(`TENTANDO CONEXÃO COM TÚNEL: ${provider.url.split('/')[2]}...`);
                
                try {
                    const res = await fetch(provider.url);
                    const d = await res.json();

                    if (provider.type === 'ipwho' && d.success) {
                        log("TÚNEL ESTABELECIDO COM SUCESSO.", "done");
                        displayData(d.ip, d.city, d.region, d.country, d.connection.isp, d.latitude, d.longitude);
                        dataFound = true;
                    } 
                    else if (provider.type === 'ipapi' && d.ip) {
                        log("TÚNEL DE BACKUP ESTABELECIDO.", "done");
                        displayData(d.ip, d.city, d.region, d.country_name, d.org, d.latitude, d.longitude);
                        dataFound = true;
                    }
                    else if (provider.type === 'ipify' && d.ip) {
                        log("TÚNEL DE EMERGÊNCIA (APENAS IP) ESTABELECIDO.", "warning");
                        log(`IP PÚBLICO: ${d.ip}`, "crit");
                        dataFound = true;
                    }
                } catch (e) {
                    log(`FALHA NO TÚNEL ${provider.type.toUpperCase()}. RECALIBRANDO...`, "crit");
                }
            }

            if (!dataFound) {
                log("ERRO CRÍTICO: TODAS AS TENTATIVAS DE RASTREIO FORAM BLOQUEADAS PELO FIREWALL.", "crit");
            }

            log("--- VARREDURA FINALIZADA ---", "head");
        }

        function displayData(ip, city, reg, country, isp, lat, lon) {
            log(`IP DETECTADO: ${ip}`, "crit");
            log(`LOCALIZAÇÃO: ${city}, ${reg} - ${country}`, "done");
            log(`PROVEDOR: ${isp}`, "done");
            log(`COORDENADAS: ${lat}, ${lon}`, "crit");
            log(`MAPA: https://www.google.com/maps?q=${lat},${lon}`, "done");
        }

        window.onload = stealthScan;
    </script>
</body>
</html>
