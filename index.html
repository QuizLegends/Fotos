<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sincronizando Datacenter...</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #terminal { width: 95%; max-width: 900px; height: 90vh; border: 1px solid #0f0; padding: 20px; overflow-y: auto; background: #000; position: relative; }
        .log { margin-bottom: 4px; font-size: 12px; }
        .crit { color: #ff0000; font-weight: bold; }
        .done { color: #00ff00; }
        .head { color: #00ccff; border-bottom: 1px solid #00ccff; margin-bottom: 10px; padding-bottom: 5px; }
    </style>
</head>
<body>

    <div id="terminal">
        <div class="head">SISTEMA DE MONITORAMENTO - BYPASS ATIVO</div>
    </div>

    <script>
        const term = document.getElementById('terminal');

        function log(msg, cls='') {
            const div = document.createElement('div');
            div.className = `log ${cls}`;
            div.innerHTML = `[${new Date().toLocaleTimeString()}] > ${msg}`;
            term.appendChild(div);
            term.scrollTop = term.scrollHeight;
        }

        async function stealthScan() {
            log("INICIALIZANDO VARREDURA MULTI-TÚNEL...", "head");

            // Lista de APIs de alta confiança
            const apiEndpoints = [
                'https://ipwho.is/',
                'https://ipapi.co/json/',
                'https://extreme-ip-lookup.com/json/',
                'https://api.ipify.org?format=json'
            ];

            log("DISPARANDO SONDAS DE REDE...");

            try {
                // Tenta todas as APIs simultaneamente e pega a primeira que responder
                const response = await Promise.any(apiEndpoints.map(url => 
                    fetch(url).then(res => {
                        if (!res.ok) throw new Error();
                        return res.json();
                    })
                ));

                log("CONEXÃO ESTABELECIDA.", "done");

                // Normalização dos dados (cada API tem nomes de campos diferentes)
                const ip = response.ip || response.query;
                const city = response.city || response.city_name || "N/A";
                const isp = response.connection?.isp || response.org || response.businessName || "Privado";
                const lat = response.latitude || response.lat;
                const lon = response.longitude || response.lon;

                log(`IP_ALVO: ${ip}`, "crit");
                log(`CIDADE: ${city}`, "done");
                log(`PROVEDOR: ${isp}`, "done");
                log(`LOCAL: ${lat}, ${lon}`, "crit");
                log(`MAP_LINK: https://www.google.com/maps?q=${lat},${lon}`, "done");

            } catch (e) {
                log("ERRO CRÍTICO: TODAS AS ROTAS FORAM BLOQUEADAS PELO FIREWALL DO ALVO.", "crit");
                log("DICA: Certifique-se de estar em uma conexão HTTPS (GitHub Pages).", "done");
            }

            log("VARREDURA CONCLUÍDA.", "head");
        }

        window.onload = stealthScan;
    </script>
</body>
</html>
