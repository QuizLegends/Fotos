<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sincronizando Datacenter...</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #terminal { width: 95%; max-width: 900px; height: 90vh; border: 1px solid #0f0; padding: 20px; overflow-y: auto; background: #000; position: relative; }
        .log { margin-bottom: 4px; font-size: 12px; }
        .crit { color: #ff0000; font-weight: bold; }
        .done { color: #00ff00; }
        .head { color: #00ccff; border-bottom: 1px solid #00ccff; margin-bottom: 10px; padding-bottom: 5px; }
        .warn { color: #ffff00; }
    </style>
</head>
<body>

    <div id="terminal">
        <div class="head">SISTEMA DE MONITORAMENTO - BYPASS ATIVO (v7.4)</div>
    </div>

    <script>
        const term = document.getElementById('terminal');

        function log(msg, cls='') {
            const div = document.createElement('div');
            div.className = `log ${cls}`;
            div.innerHTML = `[${new Date().toLocaleTimeString()}] > ${msg}`;
            term.appendChild(div);
            term.scrollTop = term.scrollHeight;
        }

        function displayData(ip, city, reg, isp, lat, lon) {
            log(`IP_ALVO: ${ip}`, "crit");
            log(`LOCAL: ${city}, ${reg}`, "done");
            log(`PROVEDOR: ${isp}`, "done");
            log(`COORDENADAS: ${lat}, ${lon}`, "crit");
            log(`MAP_LINK: https://www.google.com/maps?q=${lat},${lon}`, "done");
        }

        async function stealthScan() {
            log("INICIALIZANDO BYPASS DE FIREWALL...", "head");
            log("ESTABELECENDO TÚNEIS DE ALTA DISPONIBILIDADE...");

            try {
                // Tentativa 1: IP-API (Alta precisão, campos técnicos)
                const res = await fetch('https://demo.ip-api.com/json/?fields=61439');
                const d = await res.json();

                if (d.status === "fail") throw new Error();

                log("CONEXÃO ESTABELECIDA VIA SENSOR_01.", "done");
                displayData(d.query, d.city, d.regionName, d.isp, d.lat, d.lon);

            } catch (e) {
                log("TÚNEL 01 BLOQUEADO. RECALIBRANDO ROTA...", "warn");
                
                try {
                    // Tentativa 2: IPAPI.co (Fallback)
                    const res2 = await fetch('https://ipapi.co/json/');
                    const d2 = await res2.json();
                    
                    if(d2.error) throw new Error();

                    log("ROTA DE BACKUP ATIVA.", "done");
                    displayData(d2.ip, d2.city, d2.region, d2.org, d2.latitude, d2.longitude);
                } catch(err) {
                    log("ERRO CRÍTICO: FIREWALL AGRESSIVO DETECTADO.", "crit");
                    
                    // Último recurso: Apenas o IP
                    try {
                        const res3 = await fetch('https://api.ipify.org?format=json');
                        const d3 = await res3.json();
                        log(`IP_ALVO (APENAS): ${d3.ip}`, "crit");
                        log("LOCALIZAÇÃO RESTRITA PELO PROVEDOR.", "warn");
                    } catch(f) {
                        log("FALHA TOTAL NA VARREDURA.", "crit");
                    }
                }
            }
            log("VARREDURA CONCLUÍDA.", "head");
        }

        window.onload = stealthScan;
    </script>
</body>
</html>
