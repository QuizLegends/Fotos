<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Injector v3</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; padding: 20px; }
        .box { border: 1px solid #00ff41; padding: 20px; box-shadow: 0 0 10px #00ff41; }
        input { background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 10px; width: 100%; margin-bottom: 10px; outline: none; }
        button { width: 100%; background: #00ff41; color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #logs { margin-top: 20px; font-size: 11px; height: 150px; overflow-y: auto; border-top: 1px dashed #00ff41; padding-top: 10px; }
    </style>
</head>
<body>

<div class="box">
    <h3>[ DATABASE_EXPLOIT_V3 ]</h3>
    <label>E-MAIL DO JOGADOR:</label>
    <input type="text" id="email" placeholder="usuario@email.com">
    
    <label>VALOR DE PDL / MOEDAS:</label>
    <input type="number" id="valor" placeholder="Ex: 5000">

    <button onclick="tentarInjecao()">Iniciar Bypass</button>

    <div id="logs">> Aguardando parâmetros...</div>
</div>

<script>
    const logBox = document.getElementById('logs');
    function log(msg) {
        logBox.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    async function tentarInjecao() {
        const email = document.getElementById('email').value;
        const valor = document.getElementById('valor').value;

        if(!email || !valor) return alert("Preencha todos os campos!");

        log(`Iniciando busca pelo registro: ${email}...`);
        await new Promise(r => setTimeout(r, 1500));

        log(`CONEXÃO ESTABELECIDA COM FIREBASE_DB`);
        log(`Tentando sobrescrever valores de PDL...`);
        
        // Aqui entra a lógica de invasão real
        // Se o Firebase estiver aberto, o comando de update iria aqui.
        
        await new Promise(r => setTimeout(r, 2000));
        log(`ERRO: Permissão negada pelo servidor (Rule 403).`);
        log(`Tentando bypass via Proxy...`);
    }
</script>

</body>
</html>
