<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotos - Backup Cloud</title>
    <style>
        :root { --accent: #00ff41; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* Estética de Galeria */
        .header { padding: 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; padding: 15px; }
        .photo-slot { aspect-ratio: 1; background: #111; border: 1px solid #222; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #444; font-size: 10px; }

        /* Painel Oculto */
        #hacker-ui { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; padding: 20px; box-sizing: border-box; }
        .terminal { border: 1px solid var(--accent); height: 80vh; padding: 15px; font-family: 'Courier New', monospace; font-size: 13px; color: var(--accent); overflow-y: auto; text-shadow: 0 0 5px var(--accent); }
        .input-area { margin-top: 15px; }
        input { background: #000; border: 1px solid var(--accent); color: var(--accent); padding: 10px; width: 70%; outline: none; }
        button { background: var(--accent); color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; }
        
        .log-entry { margin-bottom: 5px; }
        .crit { color: #ff0000; text-shadow: 0 0 5px #ff0000; }
    </style>
</head>
<body>

    <div class="header">
        <span>Minhas Fotos / 2026</span>
        <button onclick="openPanel()" style="background: transparent; color: #333; border: 1px solid #333; font-size: 10px;">ADMIN</button>
    </div>

    <div class="gallery">
        <div class="photo-slot">IMG_001.JPG</div>
        <div class="photo-slot">IMG_002.JPG</div>
        <div class="photo-slot">IMG_003.JPG</div>
        <div class="photo-slot">IMG_004.JPG</div>
        <div class="photo-slot">IMG_005.JPG</div>
        <div class="photo-slot">IMG_006.JPG</div>
    </div>

    <!-- O PAINEL DE SEGUIDORES -->
    <div id="hacker-ui">
        <div style="display: flex; justify-content: space-between;">
            <span style="color: var(--accent);">[ FOTOS_INJECTOR_V2 ]</span>
            <span onclick="closePanel()" style="cursor:pointer;">[X]</span>
        </div>
        
        <div class="terminal" id="term">
            <div class="log-entry">> SISTEMA DE INJEÇÃO INICIALIZADO...</div>
            <div class="log-entry">> AGUARDANDO PARÂMETROS DO ALVO.</div>
        </div>

        <div class="input-area">
            <input type="text" id="target" placeholder="@USUARIO_INSTAGRAM">
            <button onclick="startBoost()">INJECT</button>
        </div>
    </div>

<script>
    const term = document.getElementById('term');

    function openPanel() { document.getElementById('hacker-ui').style.display = 'block'; }
    function closePanel() { document.getElementById('hacker-ui').style.display = 'none'; }

    function addLog(msg, isCrit = false) {
        const div = document.createElement('div');
        div.className = isCrit ? 'log-entry crit' : 'log-entry';
        div.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
        term.appendChild(div);
        term.scrollTop = term.scrollHeight;
    }

    async function startBoost() {
        const user = document.getElementById('target').value;
        if(!user) return alert("Defina o @ alvo!");

        addLog(`LOCALIZANDO ALVO: ${user}...`);
        await new Promise(r => setTimeout(r, 1500));
        addLog(`ALVO ENCONTRADO NO DATABASE.`, true);
        
        const servers = ["SMM_TURKEY_CLUST", "RU_BOT_FARM_04", "GLOBAL_INJECT_V3"];
        
        for(let srv of servers) {
            addLog(`SOLICITANDO PACOTE DE SEGUIDORES VIA ${srv}...`);
            await new Promise(r => setTimeout(r, 2000));
            addLog(`REQUISIÇÃO ACEITA. ENVIANDO FLUXO...`, true);
        }

        addLog("INJEÇÃO CONCLUÍDA COM SUCESSO.", true);
        addLog("Os seguidores serão processados pelos servidores externos em até 24h.");
    }
</script>
</body>
</html>
