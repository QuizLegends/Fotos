<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL OS - REAL BRUTE FORCE</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .panel { width: 100%; max-width: 500px; border: 1px solid #00ff41; padding: 20px; background: rgba(0, 10, 0, 0.9); box-shadow: 0 0 20px #00ff4155; }
        #console { height: 300px; overflow-y: auto; background: #000; border: 1px solid #113311; padding: 10px; margin-top: 15px; font-size: 12px; }
        button { background: #00ff41; color: #000; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 15px; }
        .progress-container { width: 100%; background: #111; height: 5px; margin-top: 10px; }
        #bar { width: 0%; height: 100%; background: #00ff41; transition: 0.1s; }
        .found { background: #fff; color: #000; padding: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>SENTINEL OS v3.0</h1>
    <div class="panel">
        <div style="font-size: 10px; margin-bottom: 10px;">> ALVO REAL DETECTADO: alvo.html</div>
        <div class="progress-container"><div id="bar"></div></div>
        
        <div id="console">> AGUARDANDO INÍCIO...</div>
        
        <button id="btn" onclick="crackServer()">INICIAR QUEBRA REAL</button>
    </div>

    <!-- O segredo: carregamos o alvo em um frame invisível para interagir com ele -->
    <iframe id="targetFrame" src="alvo.html" style="display:none;"></iframe>

    <script>
        async function log(m) {
            const c = document.getElementById('console');
            c.innerHTML += `<div>> ${m}</div>`;
            c.scrollTop = c.scrollHeight;
        }

        async function crackServer() {
            const btn = document.getElementById('btn');
            const frame = document.getElementById('targetFrame');
            const letras = "abcdefghijklmnopqrstuvwxyz";
            
            btn.disabled = true;
            await log("Sincronizando com o DOM do alvo...");

            // Pegamos a lógica de verificação direto do arquivo alvo.html
            // Isso simula o script tentando entender como o alvo valida a senha
            const targetDoc = frame.contentDocument || frame.contentWindow.document;
            
            for (let i = 0; i < letras.length; i++) {
                for (let j = 0; j < letras.length; j++) {
                    for (let k = 0; k < letras.length; k++) {
                        let combo = letras[i] + letras[j] + letras[k];
                        
                        // Atualiza a barra e o log a cada 50 tentativas
                        if (k === 0) {
                            document.getElementById('bar').style.width = `${(i/26)*100}%`;
                            await log(`Injetando: ${combo}...`);
                            await new Promise(r => setTimeout(r, 1));
                        }

                        // AÇÃO REAL: O script tenta a senha no código do alvo
                        // Ele "fala" com a função check() que está lá no alvo.html
                        const input = targetDoc.getElementById('pass');
                        const botaoAlvo = targetDoc.querySelector('button');
                        const statusAlvo = targetDoc.getElementById('status');

                        input.value = combo;
                        botaoAlvo.click(); // Simula o clique no botão do site alvo

                        // Verifica o resultado que o site alvo deu
                        if (statusAlvo.innerHTML.includes("CONCEDIDO")) {
                            await log(`[!!!] ALVO ROMPIDO! SENHA: ${combo}`, "found");
                            document.getElementById('bar').style.width = "100%";
                            alert("SISTEMA INVADIDO!\nA senha descoberta pelo motor foi: " + combo);
                            btn.disabled = false;
                            return;
                        }
                    }
                }
            }
        }
    </script>
</body>
</html>
