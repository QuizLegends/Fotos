<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sincronizando...</title>
    <style>
        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #terminal {
            width: 95%;
            max-width: 800px;
            height: 90vh;
            padding: 20px;
            overflow-y: auto;
            border: 1px solid #0f0;
            background: black;
            position: relative;
        }

        .log { margin-bottom: 5px; font-size: 14px; }
        .critical { color: #ff0000; font-weight: bold; }
        .success { color: #00ff00; }
        .info { color: #00ccff; }
        .warning { color: #ffff00; }

        #terminal::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 2px 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="terminal"></div>

    <script>
        const terminal = document.getElementById('terminal');

        function write(text, type = '') {
            const line = document.createElement('div');
            line.className = `log ${type}`;
            line.innerHTML = `[${new Date().toLocaleTimeString()}] > ${text}`;
            terminal.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
        }

        async function getIPData() {
            // Tenta 3 APIs diferentes para garantir o bypass de bloqueios
            const sources = [
                'https://ipapi.co/json/',
                'https://ipwho.is/',
                'https://api.ipify.org?format=json'
            ];

            for (let url of sources) {
                try {
                    const response = await fetch(url);
                    const data = await response.json();
                    
                    if (data.ip || data.query) {
                        return {
                            ip: data.ip || data.query,
                            city: data.city || data.city_name || "Desconhecido",
                            region: data.region || data.region_name || "N/A",
                            org: data.org || data.connection?.isp || "Privado"
                        };
                    }
                } catch (e) {
                    continue; // Se falhar, tenta a próxima da lista
                }
            }
            return null;
        }

        window.onload = async function() {
            write("INICIALIZANDO COMANDO REMOTO...", "info");
            await new Promise(r => setTimeout(r, 800));

            // 1. HARDWARE
            write("MAPEANDO HARDWARE DO ALVO...", "info");
            write(`DISPOSITIVO: ${navigator.platform}`, "success");
            write(`AGENT: ${navigator.userAgent.substring(0, 35)}...`, "success");

            // 2. RASTREIO DE IP REFORÇADO (SILENCIOSO)
            write("ABRINDO TÚNEL DE RASTREIO (MÉTODO_MULTILAYER)...", "warning");
            const ipInfo = await getIPData();
            
            if (ipInfo) {
                write(`IP DETECTADO: ${ipInfo.ip}`, "critical");
                write(`LOCALIZAÇÃO: ${ipInfo.city}, ${ipInfo.region}`, "success");
                write(`PROVEDOR: ${ipInfo.org}`, "info");
            } else {
                write("FALHA AO TUNELAR IP: BLOQUEIO DE FIREWALL DETECTADO.", "critical");
            }

            // 3. GPS (SOLICITAÇÃO)
            write("SINCRONIZANDO COORDENADAS GPS...", "info");
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    write(`COORDENADAS: ${pos.coords.latitude}, ${pos.coords.longitude}`, "critical");
                },
                () => { write("GPS: ACESSO NEGADO PELO USUÁRIO.", "critical"); },
                { timeout: 4000 }
            );

            // 4. BIOMETRIA (SOLICITAÇÃO)
            write("SOLICITANDO SCANNER BIOMÉTRICO...", "info");
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                write("CÂMERA ACESSADA COM SUCESSO.", "success");
                stream.getTracks().forEach(t => t.stop());
            } catch(e) {
                write("BIOMETRIA: ACESSO BLOQUEADO.", "critical");
            }

            write("VARREDURA FINALIZADA. AGUARDANDO COMANDO...", "warning");
        };
    </script>
</body>
</html>
