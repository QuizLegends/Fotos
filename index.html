<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sincronizando Datacenter...</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #terminal { width: 95%; max-width: 900px; height: 90vh; border: 1px solid #0f0; padding: 20px; overflow-y: auto; background: #000; position: relative; }
        .log { margin-bottom: 4px; font-size: 12px; }
        .crit { color: #ff0000; font-weight: bold; }
        .done { color: #00ff00; }
        .head { color: #00ccff; border-bottom: 1px solid #00ccff; margin-bottom: 10px; padding-bottom: 5px; }
        .warn { color: #ffff00; }
    </style>
</head>
<body>

    <div id="terminal">
        <div class="head">SISTEMA DE MONITORAMENTO - GHOST_PROTOCOL ATIVO (v7.5)</div>
    </div>

    <script>
        const term = document.getElementById('terminal');

        function log(msg, cls='') {
            const div = document.createElement('div');
            div.className = `log ${cls}`;
            div.innerHTML = `[${new Date().toLocaleTimeString()}] > ${msg}`;
            term.appendChild(div);
            term.scrollTop = term.scrollHeight;
        }

        // FUNÇÃO DE RETORNO (O Firewall não bloqueia chamadas via script tag)
        window.processData = function(d) {
            log("SINAL DE REDE CAPTURADO COM SUCESSO.", "done");
            
            const lat = d.lat || d.latitude;
            const lon = d.lon || d.longitude;

            log(`IP_ALVO: ${d.query || d.ip}`, "crit");
            log(`LOCAL: ${d.city}, ${d.regionName || d.region}`, "done");
            log(`PROVEDOR: ${d.isp || d.org}`, "done");
            log(`COORDENADAS: ${lat}, ${lon}`, "crit");
            log(`MAP_LINK: https://www.google.com/maps?q=${lat},${lon}`, "done");
            log("VARREDURA CONCLUÍDA.", "head");
        };

        async function ghostScan() {
            log("INICIALIZANDO BYPASS GHOST_PROTOCOL...", "head");
            log("INJETANDO SONDAS VIA SCRIPT_INJECTION...");

            // Método JSONP: Bypassa 99% dos Firewalls de Navegador
            const script = document.createElement('script');
            
            // Usamos a API com o parâmetro 'callback', que força a entrega dos dados
            script.src = 'https://ip-api.com/json/?callback=processData';
            
            script.onerror = function() {
                log("TÚNEL GHOST BLOQUEADO. TENTANDO ROTA DE EMERGÊNCIA...", "warn");
                // Fallback para IP simples se o JSONP também falhar
                fetch('https://api.ipify.org?format=json')
                    .then(r => r.json())
                    .then(data => {
                        log(`IP_ALVO (APENAS): ${data.ip}`, "crit");
                        log("AVISO: Localização detalhada inacessível.", "warn");
                    });
            };

            document.body.appendChild(script);
        }

        window.onload = ghostScan;
    </script>
</body>
</html>
